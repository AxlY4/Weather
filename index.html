<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather</title>

    <link rel="stylesheet" href="style.css">

    <link rel="icon" type="image/jpeg" href="assets/favicon.svg">
</head>
<body>
  <div class="card">
    <h2 class="welcome">Weather tracker</h2>
    <p class="tag">Find any weather forecast from anywhere just by using Weather tracker</p>
    
    <form id="weatherForm" class="search-box">
        <input type="text" id="countryInput" name="country" placeholder="Write the country name">
        <button type="submit">Submit</button>
    </form>
    
    <div id="resultBox" style="text-align: center; color: antiquewhite; margin-top: 15px;"></div>
  </div>

<script>
document.getElementById('weatherForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const country = document.getElementById('countryInput').value;
    const resultBox = document.getElementById('resultBox');

    if (!country) return;
    resultBox.innerHTML = "Fetching weather...";

    try {
        // 1. Fetch from the updated /get-weather-data route using 'country' parameter
        const response = await fetch(`https://weather-app-gles.onrender.com/get-weather-data?country=${encodeURIComponent(country)}`);
        const data = await response.json();

        if (data.error) {
            resultBox.innerHTML = `<p style="color: #ff6b6b;">${data.error}</p>`;
            return;
        }

        // 2. Change background image using data.current.condition
        document.body.className = data.current.condition;

        // 3. Display Location, Date, Time, and Temp using data.current
        resultBox.innerHTML = `
            <p style="margin: 5px 0 0 0; font-weight: bold; font-size: 1.1rem;">${data.location}</p>
            <p style="margin: 2px 0 10px 0; font-size: 0.85rem; opacity: 0.8;">${data.current.date} | ${data.current.time}</p>
            <h2 style="margin: 5px 0;">${data.current.temp}°C</h2>
            <p style="margin: 0; text-transform: capitalize; opacity: 0.9;">${data.current.condition}</p>
            <p style="margin-top: 5px; font-size: 0.85rem; opacity: 0.8;">Wind: ${data.current.wind} km/h</p>
        `;
    } catch (err) {
        resultBox.innerHTML = "Could not fetch weather.";
    }
});
</script>
  
</body>
</html>
